name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-compile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Byte-compiles every tracked .py file to catch syntax errors.
      # It does NOT execute imports, so MATLAB / PyQt6 / roboticstoolbox
      # are not required on the runner — this stays green without them.
      - name: Byte-compile Python sources
        run: |
          files=$(git ls-files '*.py')
          echo "Compiling:"
          echo "$files"
          python -m compileall -q $files
